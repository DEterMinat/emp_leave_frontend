name: Frontend CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # =============================================
  # Stage 1: Validate Structure
  # =============================================
  validate:
    name: 🔍 Validate Structure
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 📁 Check Core Files Exist
      run: |
        echo "## 🔍 Structure Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        ERRORS=0
        for file in index.html css/style.css js/app.js js/api.js; do
          if [ -f "$file" ]; then
            echo "✅ $file" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ $file is MISSING!" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS+1))
          fi
        done
        for dir in css js pages assets; do
          if [ -d "$dir" ]; then
            echo "✅ $dir/" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ $dir/ directory is MISSING!" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS+1))
          fi
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ $ERRORS -gt 0 ]; then
          echo "❌ **$ERRORS errors found**" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY

    - name: 🏷️ Validate HTML
      run: |
        # Basic HTML validation
        for html_file in $(find . -name "*.html" -not -path "./.git/*" -not -path "./node_modules/*"); do
          if grep -q "<html" "$html_file" && grep -q "</html>" "$html_file"; then
            echo "✅ $html_file - valid structure"
          else
            echo "⚠️ $html_file - may have structural issues"
          fi
        done

  # =============================================
  # Stage 2: Test & Coverage
  # =============================================
  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: package.json

    - name: 📦 Install Dependencies
      run: npm ci || npm install

    - name: 🧪 Run Tests with Coverage
      run: npm run test:coverage

    - name: 📊 Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 14

    - name: 📈 Coverage Summary
      if: always()
      run: |
        echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f coverage/coverage-summary.json ]; then
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "Coverage report generated — see uploaded artifacts" >> $GITHUB_STEP_SUMMARY
        fi

  # =============================================
  # Stage 3: Security Scan
  # =============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 📦 Install Dependencies
      run: npm ci || npm install

    - name: 🔐 NPM Audit
      run: |
        echo "## 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        npm audit --production 2>&1 | tee audit-report.txt || true
        if grep -q "found 0 vulnerabilities" audit-report.txt; then
          echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Review the npm audit report:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -10 audit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
      continue-on-error: true

    - name: 🐳 Build Docker Image
      run: docker build -t emp-leave-frontend:${{ github.sha }} .

  # =============================================
  # Stage 4: Deploy to GitHub Pages
  # =============================================
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 📦 Bundle for Deployment
      run: |
        mkdir -p _site
        cp -r index.html css js pages data _site/
        # Copy assets if exists
        [ -d assets ] && cp -r assets _site/ || true
        echo "✅ Bundle created"

    - name: 📄 Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: 📤 Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: 🌐 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: 📋 Deploy Summary
      run: |
        echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Timestamp | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
