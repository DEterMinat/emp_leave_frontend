<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Leave System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="lang-switcher-container absolute top-4 right-4 z-50"></div>
    
    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-200">
                <i data-lucide="calendar-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800" data-i18n="login.title">Employee Leave System</h1>
            <p class="text-gray-500 mt-1" data-i18n="login.subtitle">ระบบจัดการลางานพนักงาน</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 p-8 border border-gray-100">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="login.empId">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input 
                            type="text" 
                            id="employeeId" 
                            placeholder="ชื่อผู้ใช้"
                            data-i18n-placeholder="login.empIdPlaceholder"
                            class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            required
                        >
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="login.password">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="รหัสผ่าน"
                            data-i18n-placeholder="login.passwordPlaceholder"
                            class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            required
                        >
                    </div>
                </div>


                <button 
                    type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl font-semibold hover:from-blue-600 hover:to-blue-700 shadow-lg shadow-blue-200 transition flex items-center justify-center space-x-2"
                >
                    <span data-i18n="login.signin">Sign In</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <!-- Quick Login removed for production -->
        </div>

        <p class="text-center text-sm text-gray-400 mt-6">
            © 2025 Employee Leave System
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>

    <script src="js/api.js"></script>
    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('employeeId');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                UI.showToast(I18N.t('login.missingFields'), 'warning');
                if (!username) usernameInput.focus();
                else passwordInput.focus();
                return;
            }

            try {
                loginBtn.disabled = true;
                const originalContent = loginBtn.innerHTML;
                loginBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span>${I18N.t('login.checking')}</span>`;
                lucide.createIcons();

                const response = await API.request('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                if (response) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('userId', response.userId);
                    localStorage.setItem('userRole', response.roleName);
                    localStorage.setItem('userName', response.username);

                    UI.showToast('🎉 เข้าสู่ระบบสำเร็จ!', 'success');

                    const roleName = (response.roleName || '').toString().trim().toLowerCase();
                    const routes = {
                        'employee': 'pages/employee/dashboard.html',
                        'manager': 'pages/manager/dashboard.html',
                        'hr': 'pages/hr/dashboard.html',
                        'admin': 'pages/manager/dashboard.html'
                    };

                    const targetRoute = routes[roleName] || 'pages/employee/dashboard.html';
                    setTimeout(() => {
                        window.location.href = targetRoute;
                    }, 1000);
                }
            } catch (error) {
                const errorMsg = error.message.includes('401') ? I18N.t('login.invalidCredentials') : 
                                 error.message.includes('Failed to fetch') ? I18N.t('login.serverError') : 
                                 I18N.t('login.invalidCredentials');
                
                UI.showToast(errorMsg, 'error');
                console.error('Login Error:', error);
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<span data-i18n="login.signin">${I18N.t('login.signin')}</span><i data-lucide="arrow-right" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        });


    </script>
</body>
</html>
