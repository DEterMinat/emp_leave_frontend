<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Registration - Employee Leave System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-4">
                <a href="../../index.html" class="p-2 hover:bg-white rounded-xl transition shadow-sm border border-transparent hover:border-gray-100">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-gray-600"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Internal Registration</h1>
                    <p class="text-gray-500 text-sm">Create new user and employee profile</p>
                </div>
            </div>
            <div class="hidden md:flex items-center space-x-2 px-4 py-2 bg-amber-50 rounded-xl border border-amber-100">
                <i data-lucide="shield-alert" class="w-5 h-5 text-amber-500"></i>
                <span class="text-amber-700 text-xs font-bold uppercase tracking-wider">Admin Only</span>
            </div>
        </div>

        <!-- Main Form Card -->
        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <form id="registerForm" class="p-8 md:p-12 space-y-10">
                
                <!-- Section 1: Account Credentials -->
                <div class="space-y-6">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="p-2 bg-blue-50 rounded-lg text-blue-500">
                            <i data-lucide="key" class="w-5 h-5"></i>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800">Account Credentials</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Username</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                                <input type="text" id="username" required placeholder="example_id"
                                       class="w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Password</label>
                            <div class="relative">
                                <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                                <input type="password" id="password" required placeholder="••••••••"
                                       class="w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-100"></div>

                <!-- Section 2: Personal Information -->
                <div class="space-y-6">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="p-2 bg-purple-50 rounded-lg text-purple-500">
                            <i data-lucide="user-circle" class="w-5 h-5"></i>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800">Personal Information</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">First Name</label>
                            <input type="text" id="firstName" required placeholder="John"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Last Name</label>
                            <input type="text" id="lastName" required placeholder="Doe"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Email</label>
                            <input type="email" id="email" required placeholder="john.doe@company.com"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Phone Number</label>
                            <input type="text" id="phone" placeholder="+66 8X-XXX-XXXX"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-100"></div>

                <!-- Section 3: Professional Details -->
                <div class="space-y-6">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="p-2 bg-emerald-50 rounded-lg text-emerald-500">
                            <i data-lucide="briefcase" class="w-5 h-5"></i>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800">Professional Details</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Position</label>
                            <input type="text" id="position" required placeholder="Senior Developer"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Department</label>
                            <div class="relative">
                                <select id="department" required 
                                        class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium appearance-none">
                                    <option value="">Loading Departments...</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Base Salary (THB)</label>
                            <input type="number" id="baseSalary" required placeholder="50000"
                                   class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 mb-2 px-1">Role</label>
                            <div class="relative">
                                <select id="role" required 
                                        class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition font-medium appearance-none">
                                    <option value="">Loading Roles...</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-6">
                    <button type="submit" id="submitBtn"
                            class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-2xl font-bold text-lg hover:from-blue-700 hover:to-indigo-800 shadow-xl shadow-blue-200 transition-all flex items-center justify-center space-x-3 group active:scale-[0.98]">
                        <span>Create Account & Profile</span>
                        <i data-lucide="user-plus" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>

            </form>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8 mb-12">
            Internal Administrative Tool - Employee Leave System v1.5
        </p>
    </div>

    <!-- Scripts -->
    <script src="../../js/api.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/register.js"></script>
</body>
</html>
