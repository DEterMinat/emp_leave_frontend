<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests (HR) - Leave System</title>
    <script src="../../js/translations.js"></script>
    <script src="../../js/i18n.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-purple-100">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold" id="user-name">Loading...</h1>
                        <p class="text-sm text-gray-500 italic" id="user-role-dept">HR Administrator</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="lang-switcher-container mr-6 z-50"></div>
                    <button onclick="LeaveModal.toggle()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg flex items-center space-x-2 transition shadow-lg shadow-blue-200">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i>
                        <span data-i18n="common.newRequest">New Request</span>
                    </button>
                </div>
            </div>
            <div class="flex space-x-8 mt-2 overflow-x-auto">
                <a href="dashboard.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span data-i18n="common.dashboard">Dashboard</span>
                </a>
                <a href="#" class="border-b-2 border-blue-600 px-1 py-4 text-blue-600 font-medium flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                    <span data-i18n="common.leaveHistory">Leave History</span>
                </a>
                <a href="manage-request.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                    <span data-i18n="nav.allRequests">All Requests</span>
                </a>
                </a>
                <a href="team-salary.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 whitespace-nowrap transition">
                    <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                    <span data-i18n="nav.teamSalary">Team Salary</span>
                </a>
                <a href="leave-quota.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 whitespace-nowrap transition">
                    <i data-lucide="calendar-check" class="w-4 h-4"></i>
                    <span data-i18n="nav.leaveQuotaManagement">Leave Quota Management</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Request Leave modal moved to shared component: js/leaveModal.js -->

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800" id="request-title" data-i18n="common.leaveHistory">Leave History</h2>
            
            <!-- Segmented Control (Toggle) -->
            <div class="inline-flex bg-gray-100 p-1 rounded-xl shadow-inner mb-4">
                <button id="toggleMyLeave" onclick="switchView('my')" class="px-6 py-2 text-sm font-bold rounded-lg transition-all shadow-sm bg-blue-600 text-white pointer-events-none">
                    My Leave
                </button>
                <button id="toggleTeamLeave" onclick="switchView('team')" class="px-6 py-2 text-sm font-bold rounded-lg transition-all text-gray-500 hover:text-gray-700">
                    Team Leave
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
            <!-- Header Bar -->
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800" id="table-title" data-i18n="common.leaveHistory">Leave History</h3>
                <button id="filterBtn" onclick="toggleFilterPanel()" class="flex items-center space-x-2 px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 transition text-sm font-semibold text-gray-700">
                    <i data-lucide="filter" class="w-4 h-4"></i>
                    <span data-i18n="common.filter">Filter</span>
                </button>
            </div>

            <!-- Filter Panel -->
            <div id="filterPanel" class="hidden bg-gray-50 border-b p-6 transition-all duration-300">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2" data-i18n="common.status">Status</label>
                        <select id="filterStatus" onchange="applyFilters()" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-100 outline-none transition uppercase">
                            <option value="all" data-i18n="common.allStatus">All Status</option>
                            <option value="pending" data-i18n="common.pending">Pending</option>
                            <option value="approved" data-i18n="common.approved">Approved</option>
                            <option value="rejected" data-i18n="common.rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2" data-i18n="req.type">Leave Type</label>
                        <select id="filterType" onchange="applyFilters()" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-100 outline-none transition uppercase">
                            <option value="all">All Types</option>
                            <option value="Sick Leave">Sick Leave</option>
                            <option value="Annual Leave">Annual Leave</option>
                            <option value="Personal Leave">Personal Leave</option>
                            <option value="Ordination Leave">Ordination Leave</option>
                            <option value="Unpaid Leave">Unpaid Leave</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Search</label>
                        <div class="relative">
                            <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-3"></i>
                            <input type="text" id="filterSearch" oninput="applyFilters()" placeholder="Employee name or ID..." class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-100 outline-none transition">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">EMPLOYEE</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">LEAVE TYPE</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">START DATE</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">END DATE</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">DAYS</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">STATUS</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">SUBMITTED</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">APPROVED BY</th>
                        </tr>
                    </thead>
                    <tbody id="request-list" class="divide-y divide-gray-100 text-sm">
                        <!-- Content loaded by JS -->
                        <tr>
                            <td colspan="8" class="px-6 py-12 text-center text-gray-400">Loading history...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Footer -->
            <div class="bg-white px-6 py-5 border-t border-gray-100 flex items-center justify-between">
                <div id="showing-text" class="text-xs text-gray-500 font-medium">Showing 0 total records</div>
                <div class="flex space-x-2">
                    <button id="prevBtn" onclick="changePage(-1)" disabled class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition">Previous</button>
                    <button id="nextBtn" onclick="changePage(1)" disabled class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition">Next</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/app.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/leaveModal.js"></script>
    <script src="../../js/leaveDetailsModal.js"></script>
    <script>
        lucide.createIcons();
        let allLeaves = [];
        let filteredLeaves = [];
        let currentPage = 1;
        const rowsPerPage = 5;
        let currentViewMode = 'my'; // 'my' or 'team'
        let currentUser = null;

        async function initMyRequests() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = '../../index.html';
                return;
            }

            try {
                // 1. Fetch User Info
                currentUser = await API.users.getById(userId);
                document.getElementById('user-name').innerText = currentUser.username || 'HR Manager'; 
                document.getElementById('user-role-dept').innerText = 'HR';

                // Initial load: 'my' view
                await loadLeaves();

            } catch (error) {
                UI.showToast('ดึงข้อมูลผิดพลาด: ' + error.message, 'error');
            }
        }

        async function switchView(mode) {
            if (currentViewMode === mode) return;
            currentViewMode = mode;
            currentPage = 1;

            const btnMy = document.getElementById('toggleMyLeave');
            const btnTeam = document.getElementById('toggleTeamLeave');

            if (mode === 'my') {
                btnMy.className = 'px-6 py-2 text-sm font-bold rounded-lg transition-all shadow-sm bg-blue-600 text-white pointer-events-none';
                btnTeam.className = 'px-6 py-2 text-sm font-bold rounded-lg transition-all text-gray-500 hover:text-gray-700';
            } else {
                btnTeam.className = 'px-6 py-2 text-sm font-bold rounded-lg transition-all shadow-sm bg-blue-600 text-white pointer-events-none';
                btnMy.className = 'px-6 py-2 text-sm font-bold rounded-lg transition-all text-gray-500 hover:text-gray-700';
            }

            await loadLeaves();
        }

        async function loadLeaves() {
            try {
                const tbody = document.getElementById('request-list');
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-gray-400">Loading history...</td></tr>';
                
                const userId = localStorage.getItem('userId');
                if (currentViewMode === 'my') {
                    allLeaves = await API.leaves.getAll(userId);
                } else {
                    allLeaves = await API.leaves.getAll(); // Fetch all for Team Leave view
                }
                
                // Sort descending
                allLeaves.sort((a, b) => new Date(b.createdAt || b.startDate) - new Date(a.createdAt || a.startDate));
                
                applyFilters();
            } catch (err) {
                console.error(err);
                UI.showToast('เกิดข้อผิดพลาดในการโหลดข้อมูลการลา', 'error');
            }
        }

        // Generate initials for avatar
        function getInitials(name) {
            if (!name) return 'U';
            const parts = name.split(' ');
            if (parts.length >= 2) return `${parts[0].charAt(0)}${parts[1].charAt(0)}`.toUpperCase();
            return name.substring(0, 2).toUpperCase();
        }

        function getStatusBadgeClass(status) {
            const s = (status || '').toLowerCase();
            if (s === 'approved' || s === 'approve') return '<span class="px-3 py-1 bg-green-100 text-green-700 text-[11px] rounded-full font-bold tracking-wide">Approved</span>';
            if (s === 'rejected' || s === 'reject') return '<span class="px-3 py-1 bg-red-100 text-red-700 text-[11px] rounded-full font-bold tracking-wide">Rejected</span>';
            return '<span class="px-3 py-1 bg-yellow-100 text-yellow-700 text-[11px] rounded-full font-bold tracking-wide">Pending</span>';
        }

        function renderTable() {
            const tbody = document.getElementById('request-list');
            const showingText = document.getElementById('showing-text');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (!filteredLeaves || filteredLeaves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-gray-500">No leave history found</td></tr>';
                showingText.innerText = 'Showing 0 total records';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            // Pagination
            const totalPages = Math.ceil(filteredLeaves.length / rowsPerPage);
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIdx = (currentPage - 1) * rowsPerPage;
            const endIdx = startIdx + rowsPerPage;
            const currentData = filteredLeaves.slice(startIdx, endIdx);

            tbody.innerHTML = currentData.map((req, index) => {
                const s = (req.status || '').toString().toLowerCase();
                const typeLabel = req.leaveTypeName || req.type || 'Leave Request';
                const days = req.totalDays || LeaveRequest.calculateDays(req.startDate, req.endDate) || 0;
                const submittedDate = req.createdAt ? UI.formatDate(req.createdAt) : UI.formatDate(req.startDate);
                const approver = req.approverName || (s === 'approved' ? 'Manager' : '-');

                // Determine name based on view mode
                let displayName = currentViewMode === 'my' ? (currentUser.username || 'HR Manager') : (req.employeeName || req.employeeUsername || 'Employee');
                const initials = getInitials(displayName);

                const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50/50';

                return `
                    <tr class="hover:bg-blue-50/30 transition border-b border-gray-50 group ${bgClass} cursor-pointer" onclick="LeaveDetailsModal.view('${req.id || req.leaveId || req._id}')">
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs ring-2 ring-white">
                                    ${initials}
                                </div>
                                <span class="font-bold text-gray-800">${displayName}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-600 font-medium">${typeLabel}</td>
                        <td class="px-6 py-4 text-gray-600">${UI.formatDate(req.startDate)}</td>
                        <td class="px-6 py-4 text-gray-600">${UI.formatDate(req.endDate)}</td>
                        <td class="px-6 py-4 font-bold text-gray-800">${days}</td>
                        <td class="px-6 py-4">${getStatusBadgeClass(req.status)}</td>
                        <td class="px-6 py-4 text-gray-500 text-sm">${submittedDate}</td>
                        <td class="px-6 py-4 text-gray-500">${approver}</td>
                    </tr>
                `;
            }).join('');

            showingText.innerText = `Showing ${filteredLeaves.length} total records`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        // Attachment viewer modal (shared behavior for HR page)
        // Modal HTML
        const attachmentModalHtml = `
    <div id="attachmentViewer" class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Attachments</h3>
                <button onclick="closeAttachmentViewer()" class="p-2 hover:bg-gray-100 rounded-full">
                    <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
                </button>
            </div>
            <div id="attachment-list" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>
    </div>`;

        // Inject modal into DOM once
        if (!document.getElementById('attachmentViewer')) {
            const div = document.createElement('div');
            div.innerHTML = attachmentModalHtml;
            document.body.appendChild(div.firstElementChild);
            lucide.createIcons();
        }

        // Open viewer by id (use allLeaves lookup)
        async function openAttachmentViewerById(id) {
            const req = allLeaves.find(l => (l.id === id || l.leaveId === id || l._id === id));
            if (!req) return UI.showToast('ไม่พบไฟล์แนบ', 'error');
            await openAttachmentViewer(req);
        }

        async function openAttachmentViewer(req) {
            const list = document.getElementById('attachment-list');
            list.innerHTML = '';

            // try to extract urls directly from the request object
            const urls = [];
            if (Array.isArray(req.attachments)) {
                req.attachments.forEach(a => {
                    if (typeof a === 'string') urls.push(a);
                    else if (a.url) urls.push(a.url);
                    else if (a.fileUrl) urls.push(a.fileUrl);
                    else if (a.filePath) urls.push(a.filePath);
                    else if (a.path) urls.push(a.path);
                });
            }
            if (Array.isArray(req.files)) {
                req.files.forEach(f => {
                    if (typeof f === 'string') urls.push(f);
                    else if (f.url) urls.push(f.url);
                    else if (f.fileUrl) urls.push(f.fileUrl);
                    else if (f.filePath) urls.push(f.filePath);
                    else if (f.path) urls.push(f.path);
                });
            }
            if (req.attachmentUrls) urls.push(...(req.attachmentUrls || []));
            if (req.fileUrl) urls.push(req.fileUrl);
            if (req.attachmentUrl) urls.push(req.attachmentUrl);
            if (req.filePath) urls.push(req.filePath);

            // Remove duplicates
            let uniq = [...new Set(urls)].filter(Boolean);

            // Normalize relative URLs using API.baseUrl if present
            const normalize = u => {
                if (!u) return null;
                if (/^https?:\/\//i.test(u)) return u;
                if (typeof API !== 'undefined' && API.baseUrl) {
                    const base = API.baseUrl.replace(/\/$/, '');
                    return base + '/' + u.replace(/^\//, '');
                }
                return u;
            };

            uniq = uniq.map(normalize).filter(Boolean);

            // If no direct URLs found, try fetching the attachments endpoint
            if (uniq.length === 0) {
                const id = req.id || req.leaveId || req._id || '';
                if (!id) {
                    list.innerHTML = `<div class="col-span-full text-center py-8">ไม่พบไฟล์แนบ</div>`;
                    document.getElementById('attachmentViewer').classList.remove('hidden');
                    lucide.createIcons();
                    return;
                }

                try {
                    console.debug('Fetching attachments for leave id', id);
                    const attachments = await API.leaves.getAttachments(id);
                    console.debug('Attachments response:', attachments);

                    // attachments might be { data: [...] } or an array
                    const arr = Array.isArray(attachments) ? attachments : (attachments && attachments.data) ? attachments.data : [];

                    const fetched = [];
                    arr.forEach(a => {
                        if (!a) return;
                        if (typeof a === 'string') fetched.push(a);
                        else if (a.url) fetched.push(a.url);
                        else if (a.fileUrl) fetched.push(a.fileUrl);
                        else if (a.filePath) fetched.push(a.filePath);
                        else if (a.path) fetched.push(a.path);
                        else if (a.downloadUrl) fetched.push(a.downloadUrl);
                        else if (a.name && a.id) {
                            // some APIs return metadata - construct a possible download URL
                            const base = (typeof API !== 'undefined' && API.baseUrl) ? API.baseUrl.replace(/\/$/, '') : '';
                            if (base) fetched.push(base + `/api/LeaveRequests/${id}/attachments/${a.id}`);
                        }
                    });

                    uniq = [...new Set(fetched)].map(normalize).filter(Boolean);

                } catch (err) {
                    console.debug('Error fetching attachments', err);
                    UI.showToast('ไม่สามารถดึงไฟล์แนบจากเซิร์ฟเวอร์ได้', 'error');
                }
            }

            if (uniq.length === 0) {
                const fallback = (typeof API !== 'undefined' && API.baseUrl) ? `${API.baseUrl.replace(/\/$/, '')}/api/LeaveRequests/${req.id || req.leaveId || req._id}/attachments` : `/api/LeaveRequests/${req.id || req.leaveId || req._id}/attachments`;
                list.innerHTML = `<div class="col-span-full text-center py-8">No attachments available. <a href="${fallback}" target="_blank" class="text-blue-600 underline">Open attachments endpoint</a></div>`;
            } else {
                list.innerHTML = uniq.map(u => {
                    const isImage = /\.(jpg|jpeg|png|gif|webp|bmp)(\?|$)/i.test(u);
                    if (isImage) {
                        return `<div class="p-2 bg-gray-50 rounded-lg flex items-center justify-center"><a href="${u}" target="_blank" rel="noopener"><img src="${u}" class="max-h-40 object-contain" alt="attachment"></a></div>`;
                    }
                    return `<div class="p-2 bg-gray-50 rounded-lg flex items-center justify-center"><a href="${u}" target="_blank" rel="noopener" class="text-blue-600 underline">Open file</a></div>`;
                }).join('');
            }

            document.getElementById('attachmentViewer').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeAttachmentViewer() {
            const m = document.getElementById('attachmentViewer');
            if (m) m.classList.add('hidden');
        }

        function toggleFilterPanel() {
            const panel = document.getElementById('filterPanel');
            const btn = document.getElementById('filterBtn');
            const isHidden = panel.classList.contains('hidden');
            
            if (isHidden) {
                panel.classList.remove('hidden');
                btn.classList.add('bg-blue-50', 'text-blue-600', 'border-blue-200');
            } else {
                panel.classList.add('hidden');
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-200');
            }
        }
        
        function applyFilters() {
            const status = document.getElementById('filterStatus').value.toLowerCase();
            const type = document.getElementById('filterType').value.toLowerCase();
            const search = document.getElementById('filterSearch').value.toLowerCase().trim();
            
            filteredLeaves = allLeaves.filter(req => {
                const s = (req.status || 'pending').toString().toLowerCase();
                const t = (req.leaveTypeName || req.type || '').toString().toLowerCase();
                const empName = (req.employeeName || req.employeeUsername || '').toString().toLowerCase();
                const empId = (req.employeeID || req.employeeId || '').toString().toLowerCase();
                
                const matchStatus = status === 'all' || s === status;
                const matchType = type === 'all' || t.includes(type) || type.includes(t);
                const matchSearch = !search || empName.includes(search) || empId.includes(search);
                
                return matchStatus && matchType && matchSearch;
            });
            
            currentPage = 1;
            renderTable();
        }

        // Refresh list after a leave is submitted via shared modal
        document.addEventListener('leaveSubmitted', () => initMyRequests());

        window.onload = initMyRequests;
    </script>
</body>
</html>
