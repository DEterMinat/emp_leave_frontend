<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Requests (HR) - Leave System</title>
    <script src="../../js/translations.js"></script>
    <script src="../../js/i18n.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center text-white">
                        <i data-lucide="shield-check"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold" id="user-name">HR Manager</h1>
                        <p class="text-sm text-gray-500 italic" id="user-role-dept">ฝ่ายบุคคล (Human Resources)</p>
                    </div>
                </div>
                <div class="lang-switcher-container mr-6 z-50"></div>
                    <button onclick="LeaveModal.toggle()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg flex items-center space-x-2 transition shadow-lg shadow-blue-200">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span data-i18n="common.newRequest">New Request</span>
                </button>
            </div>
            <div class="flex space-x-8 mt-2 overflow-x-auto">
                <a href="dashboard.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span data-i18n="common.dashboard">Dashboard</span>
                </a>
                <a href="my-request.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                    <span data-i18n="common.leaveHistory">Leave History</span>
                </a>
                <a href="#" class="border-b-2 border-blue-600 px-1 py-4 text-blue-600 font-medium flex items-center space-x-2 transition whitespace-nowrap">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                    <span>All Requests</span>
                </a>
                </a>
                <a href="team-salary.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 whitespace-nowrap transition">
                    <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                    <span data-i18n="nav.teamSalary">Team Salary</span>
                </a>
                <a href="leave-quota.html" class="border-b-2 border-transparent px-1 py-4 text-gray-500 hover:text-gray-700 flex items-center space-x-2 whitespace-nowrap transition">
                    <i data-lucide="calendar-check" class="w-4 h-4"></i>
                    <span>Leave Quota Management</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Pending Section -->
        <div class="mb-12">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                Pending Approvals 
                <span id="pending-count" class="bg-amber-100 text-amber-600 px-2.5 py-0.5 rounded-full text-sm font-bold">(0)</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="pending-list">
                <!-- Loaded dynamically -->
            </div>
        </div>

        <!-- Approved Section -->
        <div>
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                Approved Requests
                <span id="approved-count" class="bg-green-100 text-green-600 px-2.5 py-0.5 rounded-full text-sm font-bold">(0)</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="approved-list">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </main>

    <div id="manageModal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Review Request</h3>
                    <button onclick="closeManageModal()" class="p-2 hover:bg-gray-100 rounded-full transition">
                        <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
                    </button>
                </div>
                
                <div id="modalContent" class="space-y-4">
                    </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="handleDecision('Rejected')" class="py-4 bg-red-50 text-red-600 rounded-2xl font-bold hover:bg-red-100 transition border border-red-100">
                        Reject
                    </button>
                    <button onclick="handleDecision('Approved')" class="py-4 bg-green-600 text-white rounded-2xl font-bold hover:bg-green-700 transition shadow-lg shadow-green-200">
                        Approve
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Attachment viewer modal (lightweight, works until backend provides listing API) -->
    <div id="attachmentModal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[1rem] shadow-2xl w-full max-w-3xl overflow-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Attachments</h3>
                <button onclick="closeAttachmentModal()" class="p-2 hover:bg-gray-100 rounded-full transition">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
                </button>
            </div>
            <div id="attachmentContent" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <div id="noAttachmentsMessage" class="text-center text-gray-500 mt-4"></div>
        </div>
    </div>

    <script src="../../js/app.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/leaveModal.js"></script>

    <script>
        lucide.createIcons();

        let allLeaves = [];

        async function initManageRequests() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = '../../index.html';
                return;
            }

            try {
                // 1. Fetch user info for Navbar
                const user = await API.users.getById(userId);
                document.getElementById('user-name').innerText = user.firstName && user.lastName ? `${user.firstName} ${user.lastName}` : (user.username || 'HR Manager'); 
                document.getElementById('user-role-dept').innerText = user.roleName || 'Human Resources';

                // 2. Fetch all leave requests
                allLeaves = await API.leaves.getAll(); 
                
                const pending = allLeaves.filter(l => l.status.toLowerCase() === 'pending');
                const approved = allLeaves.filter(l => l.status.toLowerCase() === 'approved');
                
                document.getElementById('pending-count').innerText = `(${pending.length})`;
                document.getElementById('approved-count').innerText = `(${approved.length})`;
                
                renderSection('pending-list', pending, true);
                renderSection('approved-list', approved, false);

            } catch (error) {
                if (typeof UI !== 'undefined' && UI.showToast) {
                    UI.showToast('Error fetching data: ' + error.message, 'error');
                }
            }
        }

        function renderSection(containerId, requests, isPending) {
            const container = document.getElementById(containerId);
            const currentUserId = localStorage.getItem('userId');
            
            if (requests.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-white rounded-[2rem] border border-dashed border-gray-200">
                        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 text-gray-300"></i>
                        <p class="text-gray-400 font-medium">No ${isPending ? 'pending' : 'approved'} requests found.</p>
                    </div>
                `;
                if (window.lucide) lucide.createIcons();
                return;
            }

            container.innerHTML = requests.map(req => {
                const name = req.employeeName || (req.employee && `${req.employee.firstName} ${req.employee.lastName}`) || req.username || 'Employee';
                const type = req.leaveTypeName || req.type || 'Leave Request';
                
                // Color mapping for leave types
                const typeColors = {
                    'Annual Leave': 'text-blue-600',
                    'Sick Leave': 'text-red-500',
                    'Personal Leave': 'text-purple-500'
                };
                const typeColor = typeColors[type] || 'text-blue-500';

                // Action buttons for pending section - Block self approval
                const isSelfRequest = (req.employeeId || req.userId || req.employee?.id) == currentUserId;
                
                let actionButtons = '';
                if (isPending) {
                    if (isSelfRequest) {
                        actionButtons = `
                            <div class="pt-4 border-t border-gray-50 mt-4 text-center">
                                <span class="text-xs font-bold text-amber-500 bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100 flex items-center justify-center gap-1.5">
                                    <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> Cannot process your own request
                                </span>
                            </div>
                        `;
                    } else {
                        actionButtons = `
                            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-gray-50 mt-4">
                                <button onclick="handleDecisionFromCard('${req.id}', 'Rejected')" 
                                        class="py-2.5 px-4 rounded-xl border border-red-200 text-red-500 font-bold text-sm hover:bg-red-50 transition flex items-center justify-center gap-2">
                                    <i data-lucide="x" class="w-4 h-4"></i> Reject
                                </button>
                                <button onclick="handleDecisionFromCard('${req.id}', 'Approved')" 
                                        class="py-2.5 px-4 rounded-xl bg-green-600 text-white font-bold text-sm hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-sm">
                                    <i data-lucide="check" class="w-4 h-4"></i> Approve
                                </button>
                            </div>
                        `;
                    }
                }

                // Attachment button
                const attachmentButton = `
                    <button onclick="openAttachmentViewerById('${req.id}')" 
                            class="w-full mt-3 py-2 text-xs font-bold text-gray-400 hover:text-blue-600 transition flex items-center justify-center gap-2 bg-gray-50/50 rounded-lg border border-transparent hover:border-blue-100 hover:bg-blue-50/30">
                        <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> View Attachment
                    </button>
                `;

                return `
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 hover:shadow-xl hover:shadow-blue-500/5 transition-all duration-300 flex flex-col relative overflow-hidden group">
                        <!-- Status Badge -->
                        <div class="absolute top-6 right-6">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${isPending ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}">
                                ${req.status}
                            </span>
                        </div>

                        <div class="mb-5">
                            <h4 class="font-bold text-xl text-gray-800 mb-1">${name}</h4>
                            <p class="text-sm font-bold ${typeColor}">${type}</p>
                        </div>

                        <div class="space-y-3 mb-5 flex-1">
                            <div class="flex items-center text-gray-500 text-sm gap-3 font-medium">
                                <div class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                </div>
                                <span>${UI.formatDate(req.startDate)} - ${UI.formatDate(req.endDate)}</span>
                            </div>
                            <div class="flex items-center text-gray-500 text-sm gap-3 font-medium">
                                <div class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400">
                                    <i data-lucide="clock" class="w-4 h-4"></i>
                                </div>
                                <span>${LeaveRequest.calculateDays(req.startDate, req.endDate)} day(s)</span>
                            </div>
                            
                            <div class="mt-4 p-4 bg-gray-50/50 rounded-2xl border border-gray-100/50 min-h-[60px]">
                                <p class="text-xs text-gray-400 font-bold uppercase mb-1 flex items-center gap-1.5">
                                    <i data-lucide="message-square" class="w-3 h-3"></i> Reason
                                </p>
                                <p class="text-gray-600 text-sm leading-relaxed line-clamp-2 italic">
                                    ${req.reason || 'No reason provided.'}
                                </p>
                            </div>
                        </div>

                        ${attachmentButton}
                        ${actionButtons}
                    </div>
                `;
            }).join('');
            
            if (window.lucide) lucide.createIcons();
        }

        let currentActiveId = null;

        async function handleDecisionFromCard(id, decision) {
            currentActiveId = id;
            await handleDecision(decision);
        }

        function openManageModal(id) {
            currentActiveId = id;
            const req = allLeaves.find(r => r.id === id);
            if (!req) return;

            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-xs text-gray-400 uppercase font-bold mb-1">Employee</p>
                    <p class="font-bold text-lg">${req.employeeName || req.username || 'พนักงาน'}</p>
                    <p class="text-blue-600 text-sm font-medium">${req.leaveTypeName || req.type || 'ประเภทการลา'}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase font-bold mb-1">Reason</p>
                    <p class="text-gray-700 leading-relaxed italic">"${req.reason || 'ไม่ระบุเหตุผล'}"</p>
                </div>
            `;
            document.getElementById('manageModal').classList.remove('hidden');
        }

        function closeManageModal() {
            document.getElementById('manageModal').classList.add('hidden');
        }

        async function handleDecision(decision) {
            try {
                const hrId = localStorage.getItem('userId'); 
                
                // Safety check for self-approval
                const req = allLeaves.find(l => l.id === currentActiveId);
                if (req && (req.employeeId || req.userId || req.employee?.id) == hrId) {
                    UI.showToast('คุณไม่สามารถจัดการคำขอลาของตนเองได้', 'warning');
                    return;
                }

                const payload = {
                    approverId: hrId,
                    comment: decision === 'Approved' ? "Approved by HR" : "Rejected by HR"
                };

                if (decision === 'Approved') {
                    await API.leaves.approve(currentActiveId, payload); 
                } else {
                    const rejectReason = prompt("ระบุเหตุผลการปฏิเสธ:");
                    if (rejectReason === null) return;
                    payload.comment = rejectReason;
                    await API.leaves.reject(currentActiveId, payload); 
                }
                
                if (typeof UI !== 'undefined' && UI.showToast) {
                    UI.showToast(`Action successful: ${decision}`, 'success');
                }
                closeManageModal();
                initManageRequests(); 
            } catch (error) {
                if (typeof UI !== 'undefined' && UI.showToast) {
                    UI.showToast('Failed to handle decision: ' + error.message, 'error');
                }
            }
        }

        function openAttachmentViewerById(id) {
            const req = allLeaves.find(r => r.id === id);
            if (!req) return;
            openAttachmentViewer(req);
        }

                async function openAttachmentViewer(req) {
                    const container = document.getElementById('attachmentContent');
                    const noMsg = document.getElementById('noAttachmentsMessage');
                    container.innerHTML = '';
                    noMsg.innerText = '';

                    // Heuristics: look for common fields that may contain urls/attachments
                    let urls = [];
                    if (Array.isArray(req.attachments) && req.attachments.length) urls = req.attachments.slice();
                    else if (Array.isArray(req.files) && req.files.length) urls = req.files.slice();
                    else if (Array.isArray(req.attachmentUrls) && req.attachmentUrls.length) urls = req.attachmentUrls.slice();

                    // single-value fields
                    if (!urls.length) {
                        if (req.attachment) urls.push(req.attachment);
                        if (req.attachmentUrl) urls.push(req.attachmentUrl);
                        if (req.attachmentLink) urls.push(req.attachmentLink);
                        if (req.fileUrl) urls.push(req.fileUrl);
                    }

                    // If we still have no attachments on the request object, try the backend listing endpoint
                    // This endpoint exists on the deployed backend: GET /api/LeaveRequests/{id}/attachments
                    try {
                        if (!urls.length && req && req.id && typeof API !== 'undefined' && API.leaves && API.leaves.getAttachments) {
                            const remote = await API.leaves.getAttachments(req.id);
                            // remote expected to be an array of { id, requestId, fileName, filePath, uploadedDate }
                            if (Array.isArray(remote) && remote.length) {
                                urls = remote.map(r => r.filePath || r.fileUrl || r.url || r.fileName || null).filter(Boolean);
                            }
                        }
                    } catch (e) {
                        // Do not fail hard; fall back to existing heuristics and show helpful message later
                        console.warn('Could not fetch attachments list for request', req && req.id, e);
                    }

                    // Normalize values (if objects were passed, try to extract url)
                    urls = urls.filter(Boolean).map(u => (typeof u === 'object' && u.url) ? u.url : u);

                    // If relative paths provided, try to prefix with API.baseUrl if available
                    const base = (typeof API !== 'undefined' && API.baseUrl) ? API.baseUrl.replace(/\/+$/, '') : '';
                    const normalized = urls.map(u => {
                        if (!u) return null;
                        if (/^https?:\/\//i.test(u) || /^data:/i.test(u)) return u;
                        if (base) return base + '/' + String(u).replace(/^\/+/, '');
                        return u;
                    }).filter(Boolean);

                    if (!normalized.length) {
                        noMsg.innerText = 'ไม่มีไฟล์แนบ หรือรอ API สำหรับรายการไฟล์แนบ';
                        document.getElementById('attachmentModal').classList.remove('hidden');
                        lucide.createIcons();
                        return;
                    }

                    for (const u of normalized) {
                        const isImage = /\.(jpe?g|png|gif|bmp|webp)(\?.*)?$/i.test(u) || /^data:image\//i.test(u);
                        if (isImage) {
                            const wrap = document.createElement('div');
                            wrap.className = 'bg-gray-50 p-2 rounded-lg flex items-center justify-center';
                            const img = document.createElement('img');
                            img.src = u;
                            img.alt = 'attachment';
                            img.className = 'max-h-60 object-contain';
                            wrap.appendChild(img);
                            container.appendChild(wrap);
                        } else {
                            const a = document.createElement('a');
                            a.href = u;
                            a.target = '_blank';
                            a.rel = 'noopener noreferrer';
                            a.className = 'text-blue-600 underline block';
                            a.innerText = u;
                            container.appendChild(a);
                        }
                    }

                    document.getElementById('attachmentModal').classList.remove('hidden');
                    lucide.createIcons();
                }

        function closeAttachmentModal() {
            document.getElementById('attachmentModal').classList.add('hidden');
        }

        window.onload = initManageRequests;
    </script>
</body>
</html>
